query Me {
  me {
    id
    userId
    displayName
    currency
    wageMode
    hourlyWage
    monthlySalary
    hoursPerWeek
    effectiveHourlyRate
    isReadyToTrack
    company {
      id
      name
      joinCode
    }
  }
}

mutation UpdateProfile($input: UpdateProfileInput!) {
  updateProfile(input: $input) {
    id
    currency
    wageMode
    hourlyWage
    monthlySalary
    hoursPerWeek
    effectiveHourlyRate
    isReadyToTrack
  }
}
