enum WageMode {
  HOURLY
  SALARY
}

type Query {
  hello: String!
  """Current authenticated user's profile, or null if not signed in."""
  me: Profile
  """Current user's own poop sessions, newest first."""
  myPoopSessions(limit: Int): [PoopSession!]!
  """The caller's in-progress session, if any. Lets the UI resume a running stopwatch after a page refresh."""
  activePoopSession: ActivePoopSession
  """Company leaderboard ranked by total time tracked. Requires the caller to be in a company."""
  companyLeaderboard(limit: Int): [CompanyLeaderboardEntry!]!
}

type Mutation {
  updateProfile(input: UpdateProfileInput!): Profile!
  createCompany(input: CreateCompanyInput!): Company!
  joinCompany(joinCode: String!): Profile!
  leaveCompany: Profile!
  """Starts a session, or returns the already-running one if the caller has one open."""
  startPoopSession: ActivePoopSession!
  """Ends the given session. Duration is computed server-side from the recorded start time, capped at a max session length."""
  stopPoopSession(id: ID!): PoopSession!
}

type Profile {
  id: ID!
  userId: String!
  displayName: String!
  currency: String
  wageMode: WageMode
  hourlyWage: Float
  monthlySalary: Float
  hoursPerWeek: Float
  effectiveHourlyRate: Float
  isReadyToTrack: Boolean!
  company: Company
}

type Company {
  id: ID!
  name: String!
  joinCode: String!
}

type CompanyLeaderboardEntry {
  userId: String!
  displayName: String!
  totalDurationSeconds: Int!
  totalMoneyEarned: Float!
  currency: String!
}

type PoopSession {
  id: ID!
  durationSeconds: Int!
  hourlyRate: Float!
  currency: String!
  moneyEarned: Float!
  createdAt: String!
}

type ActivePoopSession {
  id: ID!
  startedAt: String!
  hourlyRate: Float!
  currency: String!
}

input UpdateProfileInput {
  currency: String
  wageMode: WageMode
  hourlyWage: Float
  monthlySalary: Float
  hoursPerWeek: Float
}

input CreateCompanyInput {
  name: String!
}
